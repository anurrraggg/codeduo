services:
  - type: web
    name: codeduo-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend/express-api && npm install
    startCommand: cd backend/express-api && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is automatically set by Render - don't override it
      # --- REQUIRED FOR GOOGLE OAUTH ---
      # MONGO_URI: Your MongoDB connection string
      # JWT_SECRET: A strong random string for signing tokens
      # GOOGLE_CLIENT_ID: From Google Cloud Console
      # GOOGLE_CLIENT_SECRET: From Google Cloud Console
      # GOOGLE_REDIRECT_URI: https://codeduo.onrender.com/api/auth/google/callback
      # FRONTEND_BASE_URL: https://codeduojs.vercel.app
      # WEB_REDIRECT_SUCCESS: https://codeduojs.vercel.app/oauth/callback
      # WEB_REDIRECT_ERROR: https://codeduojs.vercel.app/login